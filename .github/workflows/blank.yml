<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WINDIGITAL - Monster Image Compressor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #007bff;
            --secondary-color: #28a745;
            --accent-color: #ffc107;
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            background-color: var(--card-bg);
            width: 100%;
            padding: 1rem 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            margin-bottom: 2rem;
        }

        header h1 {
            margin: 0;
            color: var(--primary-color);
            font-size: 1.5rem;
            letter-spacing: 1px;
        }

        header span {
            color: #fff;
            font-weight: bold;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 600px;
            text-align: center;
        }

        .upload-section {
            border: 2px dashed #444;
            padding: 2rem;
            border-radius: 10px;
            margin-bottom: 2rem;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        .upload-section:hover {
            border-color: var(--primary-color);
        }

        .upload-section i {
            font-size: 3rem;
            color: #555;
            margin-bottom: 1rem;
        }

        input[type="file"] {
            display: none;
        }

        #preview-container {
            display: none; /* Hidden until file is selected */
            margin-top: 2rem;
            border-top: 1px solid #333;
            padding-top: 2rem;
        }

        #image-preview {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            margin-bottom: 1.5rem;
        }

        .info-panel {
            background: rgba(255,255,255,0.05);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .info-panel p {
            margin: 0.5rem 0;
            display: flex;
            justify-content: space-between;
        }

        /* --- BUTTON GROUP - YAHAN SAHI POSITIONS HAI --- */
        .action-buttons {
            display: flex;
            gap: 1rem; /* Space between buttons */
            justify-content: center; /* Center the group */
            margin-top: 1rem;
        }

        .btn {
            flex: 1; /* Both buttons take equal width */
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none; /* For download link */
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn i {
            margin-right: 8px; /* Space for icon */
        }

        .btn-download {
            background-color: var(--secondary-color);
            color: white;
            box-shadow: 0 4px 6px rgba(40, 167, 69, 0.3);
        }

        .btn-download:hover {
            background-color: #218838;
            box-shadow: 0 6px 12px rgba(40, 167, 69, 0.4);
        }

        .btn-edit {
            background-color: var(--accent-color);
            color: #333;
            box-shadow: 0 4px 6px rgba(255, 193, 7, 0.3);
        }

        .btn-edit:hover {
            background-color: #e0a800;
            box-shadow: 0 6px 12px rgba(255, 193, 7, 0.4);
        }

    </style>
</head>
<body>

    <header>
        <h1><span>WIN</span>DIGITAL - Monster Compressor</h1>
    </header>

    <div class="container">
        <div class="upload-section" onclick="document.getElementById('imageInput').click()">
            <i class="fas fa-cloud-upload-alt"></i>
            <p>Drag & Drop or Click to Upload Image</p>
            <input type="file" id="imageInput" accept="image/*">
        </div>

        <div id="preview-container">
            <img id="image-preview" src="" alt="Selected Image">
            
            <div class="info-panel">
                <p><strong>File Name:</strong> <span id="fileName">-</span></p>
                <p><strong>Original Size:</strong> <span id="originalSize">-</span></p>
            </div>

            <div class="action-buttons">
                <button class="btn btn-edit" id="editBtn">
                    <i class="fas fa-edit"></i> Edit/Crop
                </button>
                
                <a href="#" class="btn btn-download" id="downloadLink" download="monster-compressed.jpg">
                    <i class="fas fa-download"></i> Download
                </a>
            </div>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const previewContainer = document.getElementById('preview-container');
        const imagePreview = document.getElementById('image-preview');
        const fileNameSpan = document.getElementById('fileName');
        const originalSizeSpan = document.getElementById('originalSize');
        const editBtn = document.getElementById('editBtn');
        const downloadLink = document.getElementById('downloadLink');

        imageInput.addEventListener('change', function(event) {
            const file = event.target.files[0];

            if (file) {
                // Show container
                previewContainer.style.display = 'block';

                // Basic Info
                fileNameSpan.innerText = file.name;
                originalSizeSpan.innerText = (file.size / 1024).toFixed(2) + ' KB';

                // Preview Image
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    
                    // Set download link source to the image
                    downloadLink.href = e.target.result;
                    
                    // --- MONSTER JOKE/LOADING ---
                    // setTimeout(() => { alert("Nichod diya hai humne photo ko! Ab download kijiye."); }, 500);
                }
                reader.readAsDataURL(file);
            }
        });

        // Edit Button Click Functionality
        editBtn.addEventListener('click', function() {
            alert("Editing feature is coming soon! Integrating a tool just for WINDIGITAL users.");
            // Futuristic note: Integrate 'cropper.js' here later.
        });
    </script>
</body>
</html>
